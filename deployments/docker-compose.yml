version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: crypto_api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DERIBIT_BASE_URL: https://test.deribit.com/api/v2
    volumes:
      - ../:/app

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_broker
    ports:
      - "6379:6379"
    profiles: ["celery"]

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: celery_worker
    command: sh -c "alembic upgrade head && celery -A app.interfaces.celery.celery_app:celery_app worker --loglevel=info"
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DERIBIT_BASE_URL: https://test.deribit.com/api/v2
    volumes:
      - ../:/app
    profiles: ["celery"]

  scheduler:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: celery_beat
    command: sh -c "alembic upgrade head && celery -A app.interfaces.celery.celery_app:celery_app beat --loglevel=info"
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DERIBIT_BASE_URL: https://test.deribit.com/api/v2
    volumes:
      - ../:/app
    profiles: ["celery"]

volumes:
  postgres_data:
